<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ESP — Educational Studies Program{% endblock %}</title>

  <!-- Bootstrap 5 — replaces the old Bootstrap 2/3 span4/row-fluid system -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  {% block stylesheets %}{% endblock %}

  <style>
    /* ── Global tokens ─────────────────────────────────────────────── */
    :root {
      --esp-blue:   #0d6efd;
      --esp-dark:   #0a2342;
      --esp-light:  #f8f9ff;
    }
    body { background: var(--esp-light); font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Top navbar ────────────────────────────────────────────────── */
    .esp-navbar {
      background: linear-gradient(135deg, #0a2342 0%, #0d3b6e 100%);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      padding: 0 1.5rem;
      height: 60px;
    }
    .esp-navbar .navbar-brand {
      font-weight: 800; font-size: 1.25rem; letter-spacing: 0.5px; color: #fff;
    }
    .esp-navbar .navbar-brand span { color: #60a5fa; }
    .esp-navbar .nav-link { color: rgba(255,255,255,0.8) !important; font-size: 0.9rem; }
    .esp-navbar .nav-link:hover { color: #fff !important; }
    .esp-navbar .btn-nav-cta {
      background: #0d6efd; color: #fff; border-radius: 20px;
      padding: 5px 18px; font-size: 0.85rem; font-weight: 600;
      border: none; transition: background 0.2s;
    }
    .esp-navbar .btn-nav-cta:hover { background: #0b5ed7; color: #fff; }

    /* ── Footer ────────────────────────────────────────────────────── */
    .esp-footer {
      background: #0a2342; color: rgba(255,255,255,0.5);
      font-size: 0.8rem; padding: 1.5rem 0; margin-top: 4rem;
      text-align: center;
    }
    .esp-footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
    .esp-footer a:hover { color: #fff; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar esp-navbar sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/esp/">
        <span>ESP</span> Portal
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="/esp/" class="nav-link d-none d-md-block">
          <i class="fas fa-home me-1"></i> Home
        </a>
        <a href="/manage/mit_splash/2024/ajaxscheduling" class="nav-link d-none d-md-block">
          <i class="fas fa-calendar-alt me-1"></i> Scheduling
        </a>
        <a href="/teach/bioedit" class="nav-link d-none d-md-block">
          <i class="fas fa-user-edit me-1"></i> Bio
        </a>
        <a href="/myesp/logout/" class="btn btn-nav-cta">
          <i class="fas fa-sign-out-alt me-1"></i> Logout
        </a>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="esp-footer">
    <div class="container">
      <p class="mb-1">
        <strong style="color:rgba(255,255,255,0.8)">Educational Studies Program</strong>
        &nbsp;·&nbsp; GSoC 2024 Modernization Prototype
      </p>
      <p class="mb-0">
        <a href="/esp/">Home</a> &nbsp;·&nbsp;
        <a href="/manage/mit_splash/2024/ajaxscheduling">Scheduling</a> &nbsp;·&nbsp;
        <a href="/teach/bioedit">Teacher Bio</a>
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
