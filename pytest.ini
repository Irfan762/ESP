[pytest]
# Point pytest-django at the ESP project settings.
# This replaces the need for a manage.py test runner and gives us
# full pytest ecosystem access (parametrize, fixtures, plugins, etc.)
DJANGO_SETTINGS_MODULE = esp.settings

# Discover tests in both the Django app tree and our dedicated e2e folder
testpaths = esp tests

# Default Playwright browser. Chromium is the primary target for ESP's
# admin-facing scheduling tools. Switch to firefox/webkit for cross-browser runs.
# Running headless by default keeps CI fast; pass --headed locally for debugging.
addopts =
    --browser chromium
    -v
